openapi: 3.0.3
info:
  title: 'Quantigo API Documentation'
  description: 'Quantigo is a commerce coordination, procurement, merchant operating system, and pooled purchasing platform.'
  version: 1.0.0
servers:
  - url: 'http://localhost:8568'
tags:
  - name: Authentication
    description: "\nEndpoints for managing merchant authentication, registration, password resets, and email verification."
  - name: Endpoints
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting the login endpoint.'
security:
  -
    default: []
paths:
  /api/v1/auth/register:
    post:
      summary: 'Register a new merchant'
      operationId: registerANewMerchant
      description: 'Create a new merchant account and trigger email verification.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
              required:
                - name
                - email
                - password
      security: []
  /api/v1/auth/login:
    post:
      summary: 'Log in a merchant'
      operationId: logInAMerchant
      description: 'Authenticate a merchant and retrieve an API token.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/v1/auth/forgot-password:
    post:
      summary: 'Request password reset link'
      operationId: requestPasswordResetLink
      description: 'Send an email with a secure link to reset the password.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address. Must match an existing stored value.'
                  example: gbailey@example.net
              required:
                - email
      security: []
  /api/v1/auth/reset-password:
    post:
      summary: 'Reset password'
      operationId: resetPassword
      description: 'Update the account password using the token sent in the reset link.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: ''
                  example: architecto
                email:
                  type: string
                  description: 'Must be a valid email address. Must match an existing stored value.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
              required:
                - token
                - email
                - password
      security: []
  /api/v1/auth/verify-email:
    post:
      summary: 'Verify email address'
      operationId: verifyEmailAddress
      description: "Mark the merchant's email address as verified using the signed URL parameters."
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ''
                  example: 16
                hash:
                  type: string
                  description: ''
                  example: architecto
              required:
                - id
                - hash
      security: []
  /api/v1/auth/me:
    get:
      summary: 'Get profile'
      operationId: getProfile
      description: 'Retrieve the profile details of the authenticated merchant.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/v1/auth/logout:
    post:
      summary: 'Log out'
      operationId: logOut
      description: 'Revoke the current access token.'
      parameters: []
      responses: {}
      tags:
        - Authentication
  /api/v1/auth/email/verification-notification:
    post:
      summary: 'Resend verification email'
      operationId: resendVerificationEmail
      description: 'Request a new verification email for the currently authenticated merchant.'
      parameters: []
      responses: {}
      tags:
        - Authentication
  /api/v1/auth/kyb/signature:
    get:
      summary: 'Get Cloudinary upload signature'
      operationId: getCloudinaryUploadSignature
      description: 'Generate a signed signature for secure direct browser uploads to Cloudinary.'
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - Authentication
  /api/v1/auth/kyb:
    post:
      summary: 'Submit KYB profile'
      operationId: submitKYBProfile
      description: 'Submit compliance registry details and Cloudinary secure document URLs for review.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                business_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                registration_type:
                  type: string
                  description: ''
                  example: limited_liability
                  enum:
                    - sole_proprietorship
                    - limited_liability
                    - cooperative
                registration_number:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                business_address:
                  type: string
                  description: ''
                  example: architecto
                business_phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: ngzmiyvdljnikhwa
                cac_certificate_path:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'http://breitenberg.com/nostrum-aut-adipisci-quidem-nostrum.html'
                cac_status_report_path:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'http://hauck.com/'
                proof_of_address_path:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'http://www.keebler.com/modi-ipsum-nostrum-omnis-autem-et'
                director_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: l
                director_bvn:
                  type: string
                  description: 'Must be 11 characters.'
                  example: dzsnrwtujwv
                director_nin:
                  type: string
                  description: 'Must be 11 characters.'
                  example: lxjklqppwqb
                director_identity_path:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'https://www.mayer.com/deleniti-nemo-odit-quia-officia'
              required:
                - business_name
                - registration_type
                - registration_number
                - business_address
                - business_phone
                - cac_certificate_path
                - cac_status_report_path
                - proof_of_address_path
                - director_name
                - director_bvn
                - director_nin
                - director_identity_path
  /api/v1/auth/kyb/check-hash:
    post:
      summary: 'Check asset hash'
      operationId: checkAssetHash
      description: 'Check if a file content hash already exists in our local registry to bypass uploading again.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hash:
                  type: string
                  description: 'Must be 64 characters.'
                  example: bngzmiyvdljnikhwaykcmyuwpwlvqwrsitcpscqldzsnrwtujwvlxjklqppwqbew
              required:
                - hash
  /api/v1/auth/kyb/register-asset:
    post:
      summary: 'Register uploaded asset'
      operationId: registerUploadedAsset
      description: 'Store an asset hash and secure URL in our local registry for future deduplication.'
      parameters: []
      responses: {}
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                file_hash:
                  type: string
                  description: 'Must be 64 characters.'
                  example: bngzmiyvdljnikhwaykcmyuwpwlvqwrsitcpscqldzsnrwtujwvlxjklqppwqbew
                url:
                  type: string
                  description: 'Must be a valid URL.'
                  example: 'http://www.schaden.com/odit-quia-officia-est-dignissimos-neque-blanditiis-odio.html'
                file_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: t
                  nullable: true
                file_size:
                  type: integer
                  description: ''
                  example: 16
                  nullable: true
                mime_type:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: 'n'
                  nullable: true
              required:
                - file_hash
                - url
