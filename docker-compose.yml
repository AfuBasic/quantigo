services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantigo-backend
    ports:
      - "8568:80"
    environment:
      APP_NAME: Quantigo
      APP_ENV: local
      APP_KEY: ${QUANTIGO_APP_KEY:-base64:9mD2uY1P0Gxv1nKJ0aYzAq3LRv6S8nB5cE4hT7pQwRs=}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8568
      FRONTEND_URL: http://localhost:5173
      SANCTUM_STATEFUL_DOMAINS: localhost:5173,127.0.0.1:5173,localhost:8568,127.0.0.1:8568
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: quantigo
      DB_USERNAME: quantigo
      DB_PASSWORD: quantigo
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_CACHE_DB: 1
      MAIL_MAILER: log
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: quantigo-mysql
    ports:
      - "33068:3306"
    environment:
      MYSQL_DATABASE: quantigo
      MYSQL_USER: quantigo
      MYSQL_PASSWORD: quantigo
      MYSQL_ROOT_PASSWORD: quantigo_root
    volumes:
      - quantigo_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "quantigo", "-pquantigo"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: quantigo-redis
    ports:
      - "63798:6379"
    volumes:
      - quantigo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  quantigo_mysql_data:
  quantigo_redis_data:
